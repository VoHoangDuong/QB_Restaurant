<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8"/>
    <title>QB Restaurant Login</title>

    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css"/>
    <link rel="stylesheet" href="/css/bootstrap.css">
    <link rel="stylesheet" href="/css/sweetalert2.min.css">
    <script src="/js/jquery-3.6.0.min.js"></script>
    <script src="/js/sweetalert2.min.js"></script>
    <script src="/js/app.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background-image: linear-gradient(rgba(0, 0, 0, 0.28), rgba(0, 0, 0, 0.28)),
            url('/uploads/logoQBrestaurant/anh_nen_2.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px 15px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-title {
            margin: 0;
            font-size: 78px;
            font-family: "Brush Script MT", cursive;
            font-weight: normal;

            background: linear-gradient(
                    180deg,
                    #fff3a0 0%,
                    #ffd700 30%,
                    #d4a017 65%,
                    #8b6508 100%
            );

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            text-shadow: 0 2px 2px rgba(0, 0, 0, 0.25),
            0 4px 8px rgba(0, 0, 0, 0.25),
            0 0 15px rgba(255, 215, 0, 0.7),
            0 0 30px rgba(255, 215, 0, 0.4);
        }

        .logo-subtitle {
            color: #fff3c4;
            font-size: 24px;
            font-family: Georgia, serif;
            font-weight: bold;
            letter-spacing: 8px;
            margin-top: -5px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
        }


        .logo-subtitle:before,
        .logo-subtitle:after {
            content: "";
            display: inline-block;
            width: 70px;
            height: 2px;
            background: #d4a017;
            vertical-align: middle;
            margin: 0 12px;
        }

        #wrapper {
            width: 460px;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.45);
        }

        #login h1 {
            text-align: center;
            font-size: 58px;
            margin-bottom: 30px;
            color: #333;
            font-weight: bold;
        }

        label {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }

        input[type=text],
        input[type=password] {
            width: 100%;
            padding: 15px;
            margin-top: 8px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #dcdcdc;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.9);
        }

        input[type=text]:focus,
        input[type=password]:focus {
            outline: none;
            border-color: #d35400;
            box-shadow: 0 0 8px rgba(211, 84, 0, 0.3);
        }

        .keeplogin {
            margin-bottom: 25px;
            font-size: 18px;
        }

        .keeplogin label {
            font-size: 18px;
            font-weight: 600;
        }

        .signin.button input[type=button] {
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 22px;
            font-weight: bold;
            background: linear-gradient(90deg, #d35400, #f39c12);
            cursor: pointer;
            transition: 0.3s;
        }

        .signin.button input[type=button]:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(211, 84, 0, 0.35);
        }

        .hiddenanchor {
            display: none;
        }

        @media (max-width: 520px) {
            .logo-title {
                font-size: 56px;
            }

            .logo-subtitle {
                font-size: 18px;
                letter-spacing: 5px;
            }

            .logo-subtitle:before,
            .logo-subtitle:after {
                width: 35px;
            }

            #wrapper {
                width: 100%;
                max-width: 420px;
            }

            #login h1 {
                font-size: 46px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <header>
        <h1 class="logo-title">Quang Binh</h1>
        <div class="logo-subtitle">RESTAURANT</div>
    </header>

    <section>
        <div id="container_demo">

            <a class="hiddenanchor" id="toregister"></a>
            <a class="hiddenanchor" id="tologin"></a>

            <div id="wrapper">
                <div id="login">

                    <form autocomplete="on" onsubmit="return false;">

                        <h1>Đăng nhập</h1>

                        <p>
                            <label for="username">Tên đăng nhập</label>
                            <input
                                    id="username"
                                    name="username"
                                    type="text"
                                    required
                                    placeholder="Nhập tên đăng nhập...">
                        </p>

                        <p>
                            <label for="password">Mật khẩu</label>
                            <input
                                    id="password"
                                    name="password"
                                    type="password"
                                    required
                                    placeholder="Nhập mật khẩu...">
                        </p>

                        <p class="keeplogin">
                            <input type="checkbox" id="loginkeeping">
                            <label for="loginkeeping">Nhớ mật khẩu</label>
                        </p>

                        <p class="signin button">
                            <input
                                    type="button"
                                    id="btnLogin"
                                    value="Đăng nhập">
                        </p>

                    </form>

                </div>
            </div>

        </div>
    </section>

</div>

<script>
    function loginHandle() {
        let employee = {
            username: $("#username").val(),
            password: $("#password").val()
        };

        $.ajax({
            type: "POST",
            headers: {
                "Accept": "application/json",
                "Content-Type": "application/json"
            },
            url: "/api/login",
            data: JSON.stringify(employee)
        }).done((user) => {
            App.showSuccessAlert("Đăng nhập thành công!");

            if (user.roles[0].authority === "ADMIN") {
                window.location.href = "/dashboard";
            } else if (user.roles[0].authority === "STAFF") {
                window.location.href = "/app";
            } else if (user.roles[0].authority === "MANAGER") {
                window.location.href = "/managerDashboard";
            }
        }).fail(() => {
            App.showErrorAlert(
                "Đã xảy ra lỗi. Vui lòng kiểm tra tên đăng nhập và mật khẩu!"
            );
        });
    }

    $("#btnLogin").on("click", function (event) {
        event.preventDefault();
        loginHandle();
    });

    $("#username, #password").on("keydown", function (event) {
        if (event.key === "Enter") {
            event.preventDefault();
            loginHandle();
        }
    });
</script>

</body>
</html>
